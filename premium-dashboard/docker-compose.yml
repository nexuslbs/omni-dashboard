services:
  premium-dashboard:
    build:
      context: repo
      dockerfile: Dockerfile
    container_name: premium-dashboard
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/data:/opt/data:ro
      - /:/host:ro
    networks:
      - default
      - omni-net
    mem_limit: 256M
    logging:
      driver: journald

networks:
  default:
    name: premium-dashboard
  omni-net:
    external: true
    name: omni-net
