<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniAgent Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    /* Prevent flash of unstyled content on hard refresh */
    html { background: #0a0f1e; }
    body { opacity: 0; transition: opacity 0.15s ease; }
    html.dark body { background: #0a0f1e; }
  </style>
  <script>if(window.innerWidth>640||screen.width>640)document.write('<style>.mobile-nav{display:none!important;visibility:hidden!important}</style>')</script>
  <link rel="stylesheet" href="/src/style.css" />
  <script type="module" src="/src/index.ts"></script>
  <script nonce="fade-in">document.addEventListener('DOMContentLoaded',function(){setTimeout(function(){document.body.style.opacity='1'},50)})</script>
</head>
<body>
  <div id="app" class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar" role="navigation">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg width="28" height="28" viewBox="0 0 64 64" class="logo-icon">
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8b5cf6"/>
                <stop offset="100%" stop-color="#06b6d4"/>
              </linearGradient>
              <linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8b5cf6"/>
                <stop offset="100%" stop-color="#06b6d4"/>
              </linearGradient>
            </defs>
            <polygon points="32,4 58,20 58,44 32,60 6,44 6,20" fill="url(#logoGrad)" opacity="0.9"/>
            <polygon points="32,12 50,23 50,41 32,52 14,41 14,23" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
            <polygon points="32,18 44,26 44,38 32,46 20,38 20,26" fill="currentColor" fill-opacity="0.15"/>
          </svg>
          <span class="logo-text">OmniAgent</span>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle" title="Collapse sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>
      <div class="sidebar-collapse-bar" id="sidebar-collapse-bar">
        <hr class="sidebar-divider" />
        <button class="sidebar-toggle sidebar-toggle-bar" id="sidebar-toggle-bar" title="Expand sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <hr class="sidebar-divider" />
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="nav-item active" data-route="overview">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Overview</span>
        </a>
        <a href="/threads" class="nav-item" data-route="threads">

          </svg>
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="connection-status" id="connection-status">
          <span class="status-dot disconnected"></span>
          <span class="status-text">Connecting...</span>
        </div>
      </div>

    <main class="main-content" id="main-content">
