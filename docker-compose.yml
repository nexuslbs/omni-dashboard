services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "12346:3001"
    environment:
      PORT: "3001"
      PGPASSWORD: omniagent
    volumes:
      - /opt/workspace/omniagent/data/:/opt/data/:ro
      - /opt/workspace/omniagent/data/user/:/opt/data/user:rw
      - ./dist:/app/dist:ro
      - ./server-dist:/app/server:ro

    networks:
      - omniagent_default

networks:
  omniagent_default:
    # This network must exist before starting the dashboard.
    # Run `bash make_network.sh` to create it if it doesn't exist,
    # or the omniagent stack should be started first.
    external: true
    name: omniagent_default
